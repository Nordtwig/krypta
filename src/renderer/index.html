<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krypta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #091925; }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #091925;
      }
      .splash-dots { display: flex; gap: 5px; }
      .splash-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #d4606e;
        opacity: 0.3;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
        40% { transform: translateY(-5px); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 21V12a5 5 0 0 1 10 0v9Z" fill="#c8bfaa" />
        <rect x="5" y="20" width="14" height="2" fill="#c8bfaa" />
        <line x1="12" y1="8" x2="12" y2="14" stroke="#091925" stroke-width="1.5" />
        <line x1="9.5" y1="11" x2="14.5" y2="11" stroke="#091925" stroke-width="1.5" />
      </svg>
      <div class="splash-dots">
        <span class="splash-dot"></span>
        <span class="splash-dot"></span>
        <span class="splash-dot"></span>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
